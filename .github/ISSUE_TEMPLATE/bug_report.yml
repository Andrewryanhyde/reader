name: Bug report
description: Report a reproducible problem in Reader
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the exact text, route, or interaction flow when relevant.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node version, pnpm version, browser, and any relevant env vars except secrets.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Logs, screenshots, or observations that may help.
